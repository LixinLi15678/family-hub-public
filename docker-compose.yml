# Family Hub - local development Docker Compose configuration
# Used for local development and testing

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: family-hub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: family_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "127.0.0.1:5432:5432"  # Only expose PostgreSQL locally during development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (development mode with hot reload)
  backend:
    build: ./backend
    container_name: family-hub-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_dev@db:5432/family_hub
      JWT_SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://127.0.0.1:5173"]'
      UPLOAD_DIR: "/data/uploads"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload
      - ./backend/app:/app/app
      - uploads_data:/data/uploads
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  uploads_data:

# Usage:
#
# 1. Start all services:
#    docker-compose up -d
#
# 2. Start only the database (recommended for local development):
#    docker-compose up -d db
#
# 3. View logs:
#    docker-compose logs -f
#
# 4. Stop services:
#    docker-compose down
#
# 5. Reset local data:
#    docker-compose down -v

# Alembic Configuration for Family Hub

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Prepend sys.path with the given path
prepend_sys_path = .

# Timezone to use for dates
# timezone = UTC

# Max length of column truncated to fit in a revision
# truncate_slug_length = 40

# Revision environments
# revision_environment = false

# Use env DATABASE_URL when available (default async driver below)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/family_hub

[post_write_hooks]
# Hooks to run after a new revision is created

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: family-hub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: family_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: .
    container_name: family-hub-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_dev@db:5432/family_hub
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
      BACKUP_DIR: /app/backups
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: family_hub
      DB_USER: postgres
      DB_PASSWORD: postgres_dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - backup_data:/app/backups
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  backup_data:
